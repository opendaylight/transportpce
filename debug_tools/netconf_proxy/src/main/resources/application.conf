# NETCONF Proxy Configuration

proxy {
  # Proxy server settings (northbound - client facing)
  server {
    host = "0.0.0.0"
    port = 17831

    # SSH authentication
    username = "admin"
    password = "admin"

    # SSH key (optional - if not provided, password auth is used)
    # hostKeyPath = "/path/to/hostkey.pem"
  }

  # Real NETCONF device settings (southbound)
  device {
    host = "10.156.196.51"
    port = 11670
    username = "admin"
    password = "admin"

    # Connection settings
    connectionTimeoutMs = 30000
    keepAliveIntervalMs = 10000
  }

  # Transformation settings
  transformation {
    # Enable/disable transformation
    enabled = false

    # Transformation class (must implement RpcTransformer interface)
    # transformerClass = "org.opendaylight.transportpce.debug.tools.netconf.proxy.transform.CustomTransformer"
  }

  # Logging
  logging {
    # Log all NETCONF messages (for debugging)
    logMessages = true

    # Log directory
    logDir = "./logs"
  }
}
