# NETCONF Proxy Configuration

proxy {
  # Proxy server settings (northbound - client facing)
  server {
    host = "0.0.0.0"
    port = 17833

    # SSH authentication
    username = "admin"
    password = "admin"

    # Hello XML file (optional - if provided, capabilities from this file will be sent to clients)
    # If not provided, device capabilities will be used
    helloXmlFile = "./samples/hello-openconfig-200.xml"
  }

  # Target NETCONF device settings (southbound)
  device {
    host = "target-device-hostname-or-ip"
    port = 830
    username = "username"
    password = "password"

    # Connection settings
    connectionTimeoutMs = 180000
    keepAliveIntervalMs = 50000
  }

  # Transformation settings
  transformation {
    # Enable/disable transformation
    enabled = true

    # RPC pattern matching and XSLT transformation
    rpcPatternsFile = "./samples/rpc-patterns.xml"
    #xsltFilesPath = "./xslt-files"

    # Transformation class (must implement RpcTransformer interface)
    # transformerClass = "org.opendaylight.transportpce.debug.tools.netconf.proxy.transform.CustomTransformer"
  }

  # Logging
  logging {
    # Log all NETCONF messages (for debugging)
    logMessages = true

    # Log directory
    logDir = "./logs"
  }
}
